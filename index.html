    <!-- Google Tag Manager - chargé après l'interactivité pour ne pas bloquer le LCP -->
    <script>
      window.dataLayer = window.dataLayer || [];
      (function () {
        var loaded = false;
        function loadGTM() {
          if (loaded) return;
          loaded = true;
          window.dataLayer.push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
          var f = document.getElementsByTagName("script")[0];
          var j = document.createElement("script");
          j.async = true;
          j.src = "https://www.googletagmanager.com/gtm.js?id=GTM-KLGC32HC";
          f.parentNode.insertBefore(j, f);
        }
        // Charge GTM après la 1ère interaction OU après 3s (selon ce qui arrive en premier)
        var events = ["scroll", "mousemove", "touchstart", "keydown", "click"];
        function onInteract() {
          events.forEach(function (e) {
            window.removeEventListener(e, onInteract, { passive: true });
          });
          loadGTM();
        }
        events.forEach(function (e) {
          window.addEventListener(e, onInteract, { passive: true });
        });
        if (document.readyState === "complete") {
          setTimeout(loadGTM, 3000);
        } else {
          window.addEventListener("load", function () {
            setTimeout(loadGTM, 3000);
          });
        }
      })();
    </script>
